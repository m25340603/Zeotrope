<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zoetrope</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:ital,wght@1,400;1,600&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#e8e2d6;
    --ink-dim:#8f887a;
    --terracotta:#9C4A24;
    --terracotta-bright:#c96a3c;
    --bg:#0d0c0a;
    --panel:#171512;
    --line:#2c2822;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--ink);
    font-family:'IBM Plex Sans',system-ui,sans-serif}
  #stage{position:fixed;inset:0;cursor:grab}
  #stage.dragging{cursor:grabbing}


  header{position:fixed;top:0;left:0;right:0;padding:20px 24px;display:flex;
    justify-content:space-between;pointer-events:none;z-index:5}
  .source{pointer-events:auto;font-family:'IBM Plex Mono',monospace;font-size:11px;
    letter-spacing:.12em;text-transform:uppercase;color:var(--ink-dim);
    text-decoration:underline;text-underline-offset:3px}
  .source:hover{color:var(--terracotta-bright)}
  .wizard-open{pointer-events:auto}


  #dock{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);z-index:5;
    background:color-mix(in srgb, var(--panel) 88%, transparent);
    backdrop-filter:blur(10px);border:1px solid var(--line);border-radius:12px;
    padding:12px 16px;display:flex;align-items:center;gap:18px;flex-wrap:wrap;
    justify-content:center;max-width:min(860px,94vw)}
  .grp{display:flex;flex-direction:column;gap:5px}
  .grp label{font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:.14em;
    text-transform:uppercase;color:var(--ink-dim)}
  .row{display:flex;align-items:center;gap:8px}


  button.ctl{background:transparent;border:1px solid var(--line);color:var(--ink);
    font-family:'IBM Plex Mono',monospace;font-size:11px;padding:7px 12px;border-radius:6px;
    cursor:pointer;transition:border-color .15s,color .15s}
  button.ctl:hover{border-color:var(--terracotta-bright)}
  button.ctl.on{border-color:var(--terracotta);color:var(--terracotta-bright)}
  #playBtn{width:44px}


  .seg{display:flex;border:1px solid var(--line);border-radius:6px;overflow:hidden}
  .seg button{background:transparent;border:none;color:var(--ink-dim);
    font-family:'IBM Plex Mono',monospace;font-size:11px;padding:7px 11px;cursor:pointer}
  .seg button.on{background:var(--terracotta);color:#fff}
  .seg button:not(.on):hover{color:var(--ink)}


  input[type=range]{-webkit-appearance:none;appearance:none;width:110px;height:2px;
    background:var(--line);border-radius:2px;outline:none;cursor:pointer}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;
    width:13px;height:13px;border-radius:50%;background:var(--terracotta-bright);
    border:2px solid var(--bg)}
  input[type=range]::-moz-range-thumb{width:11px;height:11px;border-radius:50%;
    background:var(--terracotta-bright);border:2px solid var(--bg)}
  .val{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink);min-width:38px}


  input[type=text]{background:transparent;border:1px solid var(--line);color:var(--ink);
    font-family:'IBM Plex Mono',monospace;font-size:11px;padding:6px 10px;border-radius:6px;
    outline:none;width:min(260px,40vw)}
  input[type=text]:focus{border-color:var(--terracotta-bright)}
  input[type=text]::placeholder{color:var(--ink-dim);opacity:.6}


  .file-pick{display:inline-block;white-space:nowrap}


  #stats{position:fixed;bottom:20px;left:24px;font-family:'IBM Plex Mono',monospace;
    font-size:10.5px;color:var(--ink-dim);letter-spacing:.06em;line-height:1.8;z-index:5}
  #stats b{color:var(--terracotta-bright);font-weight:500}
  #boxScore{position:fixed;top:68px;right:24px;z-index:5;width:min(380px,calc(100vw - 48px));
    max-height:calc(100vh - 180px);overflow:auto;background:color-mix(in srgb, var(--panel) 90%, transparent);
    backdrop-filter:blur(10px);border:1px solid var(--line);border-radius:8px;padding:12px;
    font-family:'IBM Plex Mono',monospace;color:var(--ink)}
  .box-title{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--terracotta-bright);
    margin-bottom:9px;display:flex;justify-content:space-between;gap:12px}
  .box-team{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-dim);
    margin:10px 0 5px}
  .stat-table{width:100%;border-collapse:collapse;font-size:10.5px;table-layout:fixed}
  .stat-table th,.stat-table td{padding:4px 3px;border-bottom:1px solid color-mix(in srgb, var(--line) 70%, transparent);
    text-align:right;white-space:nowrap}
  .stat-table th:first-child,.stat-table td:first-child{text-align:left;width:43%;overflow:hidden;text-overflow:ellipsis}
  .stat-table th{color:var(--ink-dim);font-weight:500}
  .stat-table .hot{color:var(--terracotta-bright)}
  #hint{position:fixed;bottom:20px;right:24px;font-family:'IBM Plex Mono',monospace;
    font-size:10px;color:var(--ink-dim);letter-spacing:.08em;z-index:5;text-align:right;line-height:1.8}
  #strobeNote{display:none;font-size:9.5px;color:var(--terracotta-bright)}


  #wizard{position:fixed;inset:0;display:none;align-items:center;justify-content:center;
    z-index:25;background:rgba(13,12,10,.62);backdrop-filter:blur(7px);padding:20px}
  #wizard.open{display:flex}
  .wizard-panel{width:min(520px,100%);background:color-mix(in srgb, var(--panel) 94%, transparent);
    border:1px solid var(--line);border-radius:8px;box-shadow:0 24px 80px rgba(0,0,0,.42);
    padding:18px;display:flex;flex-direction:column;gap:16px}
  .wizard-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
  .wizard-kicker{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.14em;
    text-transform:uppercase;color:var(--terracotta-bright);margin-bottom:6px}
  .wizard-title{font-family:'IBM Plex Serif',serif;font-style:italic;font-size:28px;
    line-height:1.1;font-weight:600;color:var(--ink)}
  .wizard-close{width:32px;height:32px;padding:0;flex:0 0 auto}
  .wizard-copy{font-size:14px;line-height:1.7;color:var(--ink);max-width:44em}
  .wizard-progress{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .wizard-dot{height:4px;border-radius:4px;background:var(--line)}
  .wizard-dot.on{background:var(--terracotta-bright)}
  .wizard-actions{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
  .wizard-step-actions{display:flex;gap:8px;flex-wrap:wrap}


  #veil{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:16px;z-index:20;transition:opacity .5s}
  #veil.gone{opacity:0;pointer-events:none}
  #veil .ring{width:52px;height:52px;border-radius:50%;border:2px solid var(--line);
    border-top-color:var(--terracotta-bright);animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  #veilMsg{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-dim);
    letter-spacing:.12em;text-transform:uppercase}
  #veilErr{display:none;max-width:420px;text-align:center;font-size:13px;color:var(--ink);line-height:1.7;padding:0 20px}
  #veilErr code{color:var(--terracotta-bright);font-family:'IBM Plex Mono',monospace;font-size:12px}


  @media(max-width:720px){
    #stats,#hint,#boxScore{display:none}
    header{padding:14px}
    .wizard-panel{padding:16px}
    .wizard-title{font-size:24px}
  }
  @media(prefers-reduced-motion:reduce){#veil .ring{animation:none}}
</style>
</head>
<body>


<div id="stage"></div>


<header>
  <button class="ctl wizard-open" id="wizardOpen">Wizard</button>
  <a class="source" href="https://media1.giphy.com/media/v1.Y2lkPTc5MGI3NjExa2pnbml6ZHMxNW9wc3NiMzA4eHJsZmV0ZmdkbzhsNDlmdm9nNXhqdCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/3o7buaucmSsxQf1pZK/giphy.gif" target="_blank" rel="noopener">Source</a>
</header>


<section id="wizard" aria-modal="true" role="dialog" aria-labelledby="wizardTitle">
  <div class="wizard-panel">
    <div class="wizard-top">
      <div>
        <div class="wizard-kicker" id="wizardKicker">Step 1 of 4</div>
        <h1 class="wizard-title" id="wizardTitle">Pick an animation</h1>
      </div>
      <button class="ctl wizard-close" id="wizardClose" aria-label="Close wizard">×</button>
    </div>
    <p class="wizard-copy" id="wizardCopy"></p>
    <div class="wizard-progress" aria-hidden="true">
      <div class="wizard-dot"></div>
      <div class="wizard-dot"></div>
      <div class="wizard-dot"></div>
      <div class="wizard-dot"></div>
    </div>
    <div class="wizard-actions">
      <button class="ctl" id="wizardPrev">Back</button>
      <div class="wizard-step-actions" id="wizardStepActions"></div>
      <button class="ctl on" id="wizardNext">Next</button>
    </div>
  </div>
</section>


<div id="dock">
  <div class="grp">
    <label>Transport</label>
    <div class="row">
      <button class="ctl on" id="playBtn">❚❚</button>
      <button class="ctl" id="dirBtn" title="reverse direction">⟲</button>
    </div>
  </div>
  <div class="grp">
    <label>Shutter</label>
    <div class="seg" id="modeSeg">
      <button data-mode="locked" class="on">Locked</button>
      <button data-mode="strobe">Strobe</button>
      <button data-mode="free">Free spin</button>
    </div>
  </div>
  <div class="grp">
    <label>Speed</label>
    <div class="row">
      <input type="range" id="speed" min="0.25" max="3" step="0.05" value="1.75">
      <span class="val" id="speedVal">1.75×</span>
    </div>
  </div>
  <div class="grp" id="dutyGrp" style="display:none">
    <label>Flash length</label>
    <div class="row">
      <input type="range" id="duty" min="0.05" max="0.5" step="0.01" value="0.22">
      <span class="val" id="dutyVal">22%</span>
    </div>
  </div>
  <div class="grp">
    <label>GIF source</label>
    <div class="row">
      <label class="ctl file-pick" for="gifFile">Choose file</label>
      <input type="file" id="gifFile" accept="image/gif" style="display:none">
      <input type="text" id="gifUrl" placeholder="or paste URL + enter">
    </div>
  </div>
</div>


<div id="stats"></div>
<div id="hint">
  drag to orbit · scroll to zoom
  <div id="strobeNote"></div>
</div>


<div id="veil">
  <div class="ring"></div>
  <div id="veilMsg">loading</div>
  <div id="veilErr"></div>
</div>


<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* ================================================================
   ZOETROPE  (simplified)


   The math:
     N frames  →  N panels on a drum
     One animation frame = one panel spacing = 2π/N radians
     Drum angular velocity  ω = fps · 2π/N
     rev/s = fps / N


   "Locked" mode quantizes rotation to exact panel boundaries
   so the artwork appears frozen while the drum spins.
   "Strobe" mode flashes lights at fps Hz for the same effect.
   "Free spin" shows continuous rotation — panels blur.
   ================================================================ */

/* -------- GIF decoder (LZW) -------- */
function lzwDecode(minCodeSize, data, pixelCount){
  const MAX = 4096;
  const pixels = new Uint8Array(pixelCount);
  const clearCode = 1 << minCodeSize, eoi = clearCode + 1;
  let codeSize = minCodeSize + 1, codeMask = (1 << codeSize) - 1, avail = eoi + 1;
  const prefix = new Int32Array(MAX), suffix = new Uint8Array(MAX), stack = new Uint8Array(MAX + 1);
  for (let i = 0; i < clearCode; i++) suffix[i] = i;
  let datum = 0, bits = 0, first = 0, top = 0, pi = 0, bi = 0, oldCode = -1;
  while (pi < pixelCount){
    if (top === 0){
      if (bits < codeSize){ if (bi >= data.length) break; datum += data[bi++] << bits; bits += 8; continue; }
      let code = datum & codeMask; datum >>= codeSize; bits -= codeSize;
      if (code > avail || code === eoi) break;
      if (code === clearCode){ codeSize = minCodeSize + 1; codeMask = (1 << codeSize) - 1; avail = eoi + 1; oldCode = -1; continue; }
      if (oldCode === -1){ stack[top++] = suffix[code]; oldCode = code; first = code; continue; }
      const inCode = code;
      if (code === avail){ stack[top++] = first; code = oldCode; }
      while (code > clearCode){ stack[top++] = suffix[code]; code = prefix[code]; }
      first = suffix[code] & 0xff;
      stack[top++] = first;
      if (avail < MAX){ prefix[avail] = oldCode; suffix[avail] = first; avail++; if ((avail & codeMask) === 0 && avail < MAX){ codeSize++; codeMask += avail; } }
      oldCode = inCode;
    }
    pixels[pi++] = stack[--top];
  }
  return pixels;
}


function deinterlace(pix, w, h){
  const out = new Uint8Array(pix.length);
  const starts = [0,4,2,1], steps = [8,8,4,2];
  let from = 0;
  for (let pass = 0; pass < 4; pass++)
    for (let row = starts[pass]; row < h; row += steps[pass])
      { out.set(pix.subarray(from * w, (from + 1) * w), row * w); from++; }
  return out;
}


function parseGIF(buffer){
  const d = new Uint8Array(buffer); let p = 0;
  const readShort = () => d[p++] | (d[p++] << 8);
  const sig = String.fromCharCode(d[0],d[1],d[2],d[3],d[4],d[5]); p = 6;
  if (!/^GIF8[79]a$/.test(sig)) throw new Error("Not a GIF");
  const width = readShort(), height = readShort();
  const packed = d[p++]; p += 2;
  let gct = null;
  if (packed >> 7 & 1){ const n = 2 << (packed & 7); gct = d.slice(p, p + 3 * n); p += 3 * n; }
  const frames = []; let gce = null;
  while (p < d.length){
    const block = d[p++];
    if (block === 0x21){
      const label = d[p++];
      if (label === 0xF9){
        const size = d[p++], flags = d[p];
        gce = { disposal: (flags >> 2) & 7, transparent: (flags & 1) ? d[p + 3] : -1, delay: d[p + 1] | (d[p + 2] << 8) };
        p += size; p++;
      } else { while (d[p] !== 0) p += d[p] + 1; p++; }
    } else if (block === 0x2C){
      const left = readShort(), top = readShort(), w = readShort(), h = readShort();
      const ip = d[p++]; let ct = gct;
      if (ip >> 7 & 1){ const n = 2 << (ip & 7); ct = d.slice(p, p + 3 * n); p += 3 * n; }
      const minCode = d[p++]; let len = 0, q = p;
      while (q < d.length && d[q] !== 0){ len += d[q]; q += d[q] + 1; }
      const data = new Uint8Array(len); let o = 0; q = p;
      while (q < d.length && d[q] !== 0){ data.set(d.subarray(q + 1, q + 1 + d[q]), o); o += d[q]; q += d[q] + 1; }
      p = q + 1;
      let pix = lzwDecode(minCode, data, w * h);
      if (ip >> 6 & 1) pix = deinterlace(pix, w, h);
      frames.push({ left, top, w, h, pix, ct, gce: gce || { disposal: 0, transparent: -1, delay: 10 } });
      gce = null;
    } else if (block === 0x3B) break;
  }
  if (!frames.length) throw new Error("No frames");
  return { width, height, frames };
}


function compositeFrames(gif){
  const { width: W, height: H, frames } = gif;
  const work = document.createElement("canvas"); work.width = W; work.height = H;
  const ctx = work.getContext("2d");
  const patch = document.createElement("canvas");
  const pctx = patch.getContext("2d");
  const out = []; let saved = null;
  for (const f of frames){
    patch.width = f.w; patch.height = f.h;
    const img = pctx.createImageData(f.w, f.h);
    for (let i = 0; i < f.pix.length; i++){
      const c = f.pix[i];
      if (c === f.gce.transparent) continue;
      img.data[i*4] = f.ct[c*3]; img.data[i*4+1] = f.ct[c*3+1]; img.data[i*4+2] = f.ct[c*3+2]; img.data[i*4+3] = 255;
    }
    pctx.putImageData(img, 0, 0);
    if (f.gce.disposal === 3) saved = ctx.getImageData(0, 0, W, H);
    ctx.drawImage(patch, f.left, f.top);
    const snap = document.createElement("canvas"); snap.width = W; snap.height = H;
    snap.getContext("2d").drawImage(work, 0, 0);
    out.push({ canvas: snap, delay: Math.max(f.gce.delay, 2) / 100 });
    if (f.gce.disposal === 2) ctx.clearRect(f.left, f.top, f.w, f.h);
    else if (f.gce.disposal === 3 && saved) ctx.putImageData(saved, 0, 0);
  }
  return { frames: out, width: W, height: H };
}


function resample(frames){
  const total = frames.reduce((s, f) => s + f.delay, 0);
  if (frames.length <= MAX_PANELS) return { frames, fps: frames.length / total, sampledFrom: null };
  const picked = [];
  for (let i = 0; i < MAX_PANELS; i++) picked.push(frames[Math.floor(i * frames.length / MAX_PANELS)]);
  return { frames: picked, fps: MAX_PANELS / total, sampledFrom: frames.length };
}


/* -------- simplified texture: just the frame, no border/paper -------- */
function makeCardTexture(frameCanvas){
  const fw = frameCanvas.width, fh = frameCanvas.height;
  const scale = Math.min(1, TEX_MAX / fw);
  const cw = Math.round(fw * scale);
  const ch = Math.round(fh * scale);
  const c = document.createElement("canvas"); c.width = cw; c.height = ch;
  c.getContext("2d").drawImage(frameCanvas, 0, 0, cw, ch);
  const tex = new THREE.CanvasTexture(c);
  tex.anisotropy = 4;
  return { tex, aspect: ch / cw };
}

function drawPlayer(x, y, p, home, t){
  const ctx = gameCtx;
  const stride = Math.sin(t * 7 + p.phase);
  const lean = Math.sin(t * 2 + p.phase) * 0.08;
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(lean);

  ctx.fillStyle = "rgba(0,0,0,.34)";
  ctx.beginPath(); ctx.ellipse(0, 38, 28, 9, 0, 0, Math.PI * 2); ctx.fill();

  ctx.lineCap = "round";
  ctx.lineJoin = "round";
  ctx.strokeStyle = p.skin;
  ctx.lineWidth = 9;
  ctx.beginPath(); ctx.moveTo(-16, -8); ctx.lineTo(-32 - stride * 7, 14 + stride * 5); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(16, -8); ctx.lineTo(32 - stride * 7, 14 - stride * 5); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-9, 30); ctx.lineTo(-21 + stride * 9, 62); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(9, 30); ctx.lineTo(21 + stride * -9, 62); ctx.stroke();

  ctx.strokeStyle = home ? "#f4f4f4" : "#111820";
  ctx.lineWidth = 8;
  ctx.beginPath(); ctx.moveTo(-21 + stride * 9, 62); ctx.lineTo(-30 + stride * 11, 66); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(21 + stride * -9, 62); ctx.lineTo(30 + stride * -11, 66); ctx.stroke();

  const jersey = home ? "#552583" : "#f4f4f4";
  const trim = home ? "#FDB927" : "#1D428A";
  ctx.fillStyle = jersey;
  ctx.strokeStyle = trim;
  ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.moveTo(-22, -16); ctx.quadraticCurveTo(0, -28, 22, -16);
  ctx.lineTo(18, 28); ctx.quadraticCurveTo(0, 40, -18, 28);
  ctx.closePath(); ctx.fill(); ctx.stroke();

  ctx.fillStyle = home ? "#3d1d66" : "#dfe5f0";
  ctx.strokeStyle = trim;
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(-18, 24); ctx.lineTo(-9, 50); ctx.lineTo(0, 28); ctx.lineTo(9, 50); ctx.lineTo(18, 24);
  ctx.closePath(); ctx.fill(); ctx.stroke();

  ctx.fillStyle = p.skin;
  ctx.strokeStyle = "rgba(0,0,0,.28)";
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(0, -45, 16, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  ctx.fillStyle = p.hair;
  ctx.beginPath(); ctx.ellipse(0, -55, 15, 8, 0, Math.PI, Math.PI * 2); ctx.fill();
  ctx.fillStyle = "rgba(255,255,255,.82)";
  ctx.beginPath(); ctx.arc(-5, -45, 2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(5, -45, 2, 0, Math.PI * 2); ctx.fill();

  ctx.fillStyle = trim;
  ctx.font = "700 20px IBM Plex Sans, system-ui, sans-serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText(p.no, 0, 6);
  ctx.restore();
}


function drawHoop(x, y, side){
  gameCtx.save();
  gameCtx.strokeStyle = "rgba(22,28,36,.82)";
  gameCtx.lineWidth = 8;
  gameCtx.beginPath(); gameCtx.moveTo(x + side * 46, y); gameCtx.lineTo(x + side * 10, y); gameCtx.stroke();
  gameCtx.fillStyle = "rgba(255,255,255,.78)";
  gameCtx.strokeStyle = "rgba(22,64,125,.85)";
  gameCtx.lineWidth = 5;
  gameCtx.fillRect(x + side * 5 - 5, y - 42, 10, 84);
  gameCtx.strokeRect(x + side * 5 - 5, y - 42, 10, 84);
  gameCtx.strokeStyle = "#d64b2a";
  gameCtx.lineWidth = 5;
  gameCtx.beginPath(); gameCtx.ellipse(x - side * 16, y, 26, 10, 0, 0, Math.PI * 2); gameCtx.stroke();
  gameCtx.strokeStyle = "rgba(255,255,255,.56)";
  gameCtx.lineWidth = 2;
  for (let i = -2; i <= 2; i++){
    gameCtx.beginPath();
    gameCtx.moveTo(x - side * 16 + i * 8, y + 8);
    gameCtx.lineTo(x - side * 16 + i * 5, y + 32);
    gameCtx.stroke();
  }
  gameCtx.beginPath(); gameCtx.moveTo(x - side * 38, y + 24); gameCtx.lineTo(x - side * 2, y + 24); gameCtx.stroke();
  gameCtx.restore();
}


function drawReferee(t, side, phase){
  const ctx = gameCtx;
  const x = Math.sin(t * 0.7 + phase) * 165;
  const y = side * (196 + Math.sin(t * 1.1 + phase) * 6);
  const stride = Math.sin(t * 5 + phase) * 5;
  ctx.save();
  ctx.translate(x, y);
  if (side < 0) ctx.scale(1, -1);
  ctx.fillStyle = "rgba(0,0,0,.32)";
  ctx.beginPath(); ctx.ellipse(0, 35, 24, 8, 0, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = "#8b5a3c";
  ctx.lineWidth = 8;
  ctx.lineCap = "round";
  ctx.beginPath(); ctx.moveTo(-9, 24); ctx.lineTo(-17 + stride, 58); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(9, 24); ctx.lineTo(17 - stride, 58); ctx.stroke();
  ctx.strokeStyle = "#1f2730";
  ctx.lineWidth = 7;
  ctx.beginPath(); ctx.moveTo(-17 + stride, 58); ctx.lineTo(-25 + stride, 62); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(17 - stride, 58); ctx.lineTo(25 - stride, 62); ctx.stroke();
  ctx.fillStyle = "#f4f4f4";
  ctx.strokeStyle = "#111820";
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(-21, -16); ctx.quadraticCurveTo(0, -28, 21, -16);
  ctx.lineTo(18, 28); ctx.quadraticCurveTo(0, 40, -18, 28);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.fillStyle = "#111820";
  for (let i = -2; i <= 2; i++) ctx.fillRect(i * 8 - 3, -18, 5, 54);
  ctx.strokeStyle = "#8b5a3c";
  ctx.lineWidth = 8;
  ctx.beginPath(); ctx.moveTo(-18, -6); ctx.lineTo(-34, -28); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(18, -6); ctx.lineTo(36, 10); ctx.stroke();
  ctx.fillStyle = "#8b5a3c";
  ctx.strokeStyle = "rgba(0,0,0,.28)";
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(0, -46, 15, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  ctx.fillStyle = "#111820";
  ctx.beginPath(); ctx.ellipse(0, -58, 14, 7, 0, Math.PI, Math.PI * 2); ctx.fill();
  ctx.font = "700 13px IBM Plex Mono, monospace";
  ctx.textAlign = "center";
  ctx.fillText("REF", 0, 9);
  ctx.restore();
}


function drawScoreboard(t){
  const ctx = scoreboardCtx;
  const home = 82 + Math.floor(t / 7) % 18;
  const away = 79 + Math.floor((t + 4) / 8) % 17;
  const clock = Math.max(0, 720 - Math.floor(t * 8) % 720);
  const mins = Math.floor(clock / 60);
  const secs = String(clock % 60).padStart(2, "0");
  const shot = 24 - Math.floor(t * 2.4) % 24;
  ctx.clearRect(0, 0, scoreboardCanvas.width, scoreboardCanvas.height);
  ctx.fillStyle = "rgba(4,7,12,.94)";
  ctx.fillRect(0, 0, scoreboardCanvas.width, scoreboardCanvas.height);
  ctx.strokeStyle = "rgba(253,185,39,.86)";
  ctx.lineWidth = 8;
  ctx.strokeRect(12, 12, scoreboardCanvas.width - 24, scoreboardCanvas.height - 24);
  ctx.fillStyle = "#e8e2d6";
  ctx.font = "700 32px IBM Plex Mono, monospace";
  ctx.textAlign = "center";
  ctx.fillText("CENTER COURT 5V5", 384, 48);
  ctx.font = "800 76px IBM Plex Sans, system-ui, sans-serif";
  ctx.fillStyle = "#FDB927";
  ctx.fillText(home, 198, 132);
  ctx.fillStyle = "#7fb1ff";
  ctx.fillText(away, 570, 132);
  ctx.fillStyle = "#e8e2d6";
  ctx.font = "700 24px IBM Plex Mono, monospace";
  ctx.fillText("LEGENDS", 198, 166);
  ctx.fillText("CHALLENGERS", 570, 166);
  ctx.font = "800 38px IBM Plex Mono, monospace";
  ctx.fillText(`${mins}:${secs}`, 384, 124);
  ctx.fillStyle = "#ff5f3d";
  ctx.fillText(String(shot).padStart(2, "0"), 384, 176);
  scoreboardTex.needsUpdate = true;
}


function updateCourtGame(t){
  if (!gameCtx) return;
  gameCtx.clearRect(0, 0, gameCanvas.width, gameCanvas.height);
  gameCtx.save();
  gameCtx.translate(512, 256);
  drawHoop(-448, 0, -1);
  drawHoop(448, 0, 1);
  const people = [];
  HOME_PLAYERS.forEach(p => {
    const x = p.ox + Math.sin(t * 1.4 + p.phase) * 48 + Math.cos(t * .7 + p.phase) * 22;
    const y = p.oy + Math.cos(t * 1.2 + p.phase) * 32;
    people.push({ x, y, p, home: true });
  });
  AWAY_PLAYERS.forEach(p => {
    const x = p.ox + Math.sin(t * 1.25 + p.phase) * 50 - Math.cos(t * .8 + p.phase) * 20;
    const y = p.oy + Math.cos(t * 1.35 + p.phase) * 34;
    people.push({ x, y, p, home: false });
  });
  people.sort((a, b) => a.y - b.y).forEach(person => drawPlayer(person.x, person.y, person.p, person.home, t));
  drawReferee(t, 1, 0);
  drawReferee(t, -1, 2.6);
  const ballX = Math.sin(t * 1.55) * 245;
  const ballY = Math.sin(t * 3.1) * 86;
  const arc = Math.abs(Math.sin(t * 3.1));
  gameCtx.fillStyle = "rgba(0,0,0,.28)";
  gameCtx.beginPath(); gameCtx.ellipse(ballX, ballY + 24, 20, 7, 0, 0, Math.PI * 2); gameCtx.fill();
  gameCtx.fillStyle = "#d87328";
  gameCtx.strokeStyle = "rgba(60,24,8,.75)";
  gameCtx.lineWidth = 4;
  gameCtx.beginPath(); gameCtx.arc(ballX, ballY - arc * 34, 13, 0, Math.PI * 2); gameCtx.fill(); gameCtx.stroke();
  gameCtx.restore();
  gameTex.needsUpdate = true;
  drawScoreboard(t);
}

function updateCamera(){
  sph.phi = Math.max(0.35, Math.min(2.6, sph.phi));
  sph.r   = Math.max(4, Math.min(18, sph.r));
  camera.position.set(
    sph.r * Math.sin(sph.phi) * Math.sin(sph.theta),
    sph.r * Math.cos(sph.phi),
    sph.r * Math.sin(sph.phi) * Math.cos(sph.theta)
  );
  camera.lookAt(0, 0, 0);
}


/* orbit controls */
(function orbit(){
  let dragging = false, px = 0, py = 0, pinch = 0;
  stage.addEventListener("pointerdown", e => {
    dragging = true; px = e.clientX; py = e.clientY;
    stage.classList.add("dragging"); stage.setPointerCapture(e.pointerId);
  });
  stage.addEventListener("pointermove", e => {
    if (!dragging) return;
    sph.theta -= (e.clientX - px) * 0.005;
    sph.phi   -= (e.clientY - py) * 0.005;
    px = e.clientX; py = e.clientY;
  });
  const up = () => { dragging = false; stage.classList.remove("dragging"); };
  stage.addEventListener("pointerup", up);
  stage.addEventListener("pointercancel", up);
  stage.addEventListener("wheel", e => { e.preventDefault(); sph.r *= 1 + Math.sign(e.deltaY) * 0.08; }, { passive: false });
  stage.addEventListener("touchmove", e => {
    if (e.touches.length === 2){
      const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      if (pinch) sph.r *= pinch / d; pinch = d;
    }
  }, { passive: true });
  stage.addEventListener("touchend", () => pinch = 0);
})();


/* -------- drum: just the panels, nothing else -------- */
function buildDrum(cards){
  if (drum) scene.remove(drum);
  drum = new THREE.Group();


  const N = cards.length;
  const gap = 0.86;                        // panel arc / slot arc
  const slot = Math.PI * 2 / N;
  const thetaLen = slot * gap;
  const panelH = 1.55;
  const aspect = cards[0].aspect;
  const arcW = panelH / aspect;
  const R = arcW / thetaLen;


  cards.forEach((card, i) => {
    const geo = new THREE.CylinderGeometry(R, R, panelH, 10, 1, true,
      i * slot - thetaLen / 2, thetaLen);
    const mat = new THREE.MeshLambertMaterial({ map: card.tex, side: THREE.DoubleSide });
    drum.add(new THREE.Mesh(geo, mat));
  });


  scene.add(drum);
  sph.r = R * 3.3;
  if (legendRing){ scene.remove(legendRing); legendRing = null; }
  return { N, R };
}


function buildLegendRing(drumRadius){
  if (legendRing) scene.remove(legendRing);
  legendRing = new THREE.Group();
  const ringRadius = Math.max(drumRadius + 1.45, 3.5);
  const cardW = Math.min(1.08, ringRadius * 0.28);
  const cardH = cardW * 1.5;
  LEGENDS.forEach((legend, i) => {
    const angle = i / LEGENDS.length * Math.PI * 2;
    const tex = makeLegendTexture(legend);
    tex.anisotropy = 4;
    const card = new THREE.Mesh(
      new THREE.PlaneGeometry(cardW, cardH),
      new THREE.MeshLambertMaterial({ map: tex, transparent: true, side: THREE.DoubleSide })
    );
    card.position.set(Math.sin(angle) * ringRadius, -0.55, Math.cos(angle) * ringRadius);
    card.rotation.y = angle;
    card.userData = { baseY: card.position.y, angle };
    legendRing.add(card);
  });
  scene.add(legendRing);
}

    const btn = document.createElement("button");
    btn.className = "ctl";
    btn.type = "button";
    btn.textContent = action.label;
    btn.addEventListener("click", action.run);
    return btn;
  }));
}

function openWizard(){
  renderWizard();
  $("wizard").classList.add("open");
  $("wizardNext").focus();
}

function closeWizard(){
  $("wizard").classList.remove("open");
  $("wizardOpen").focus();
}

$("wizardOpen").addEventListener("click", openWizard);
$("wizardClose").addEventListener("click", closeWizard);
$("wizardPrev").addEventListener("click", () => {
  wizardIndex = Math.max(0, wizardIndex - 1);
  renderWizard();
});
$("wizardNext").addEventListener("click", () => {
  if (wizardIndex === wizardSteps.length - 1){ closeWizard(); return; }
  wizardIndex++;
  renderWizard();
});
$("wizard").addEventListener("click", e => {
  if (e.target === $("wizard")) closeWizard();
});
window.addEventListener("keydown", e => {
  if (e.key === "Escape" && $("wizard").classList.contains("open")) closeWizard();
});


function refreshStats(){
  const f = effFps(), rev = f / state.N;
  const src = state.sampledFrom ? ` (sampled from ${state.sampledFrom})` : "";
  $("stats").innerHTML =
    `<b>${state.N}</b> panels${src}<br>` +
    `<b>${f.toFixed(1)}</b> fps · <b>${rev.toFixed(2)}</b> rev/s<br>` +
    `ω = fps · 2π / N = <b>${omega().toFixed(2)}</b> rad/s`;
  $("strobeNote").textContent = `⚠ strobe flashes at ~${f.toFixed(0)} Hz`;
}


/* -------- GIF loading -------- */
function loadGifFromBuffer(buf){
  const veil = $("veil"), msg = $("veilMsg"), err = $("veilErr");
  veil.classList.remove("gone"); err.style.display = "none"; msg.style.display = "";
  try {
    msg.textContent = "decoding frames";
    const gif = parseGIF(buf);
    const comp = compositeFrames(gif);
    const { frames, fps, sampledFrom } = resample(comp.frames);
    msg.textContent = "building drum";
    const cards = frames.map(f => makeCardTexture(f.canvas));
    const { N } = buildDrum(cards);
    state.N = N; state.baseFps = Math.min(Math.max(fps, 4), 30);
    state.sampledFrom = sampledFrom; state.simTime = 0;
    refreshStats();
    veil.classList.add("gone");
  } catch (e){
    msg.style.display = "none"; err.style.display = "block";
    err.innerHTML = `Couldn't decode GIF — <code>${e.message}</code>`;
  }
}


async function loadGifFromUrl(url, fallbackToEmbedded){
  const veil = $("veil"), msg = $("veilMsg"), err = $("veilErr");
  veil.classList.remove("gone"); err.style.display = "none"; msg.style.display = "";
  try {
    msg.textContent = "fetching gif";
    const res = await fetch(url);
    if (!res.ok) throw new Error("HTTP " + res.status);
    loadGifFromBuffer(await res.arrayBuffer());
  } catch (e){
    if (fallbackToEmbedded){
      console.warn("GIF fetch failed (" + e.message + "), using embedded sprite sheet");
      bootEmbedded();
    } else {
      msg.style.display = "none"; err.style.display = "block";
      err.innerHTML = `Couldn't fetch GIF — <code>${e.message}</code>.<br><br>` +
        `If opening locally, use <b>Choose file</b> instead.`;
    }
  }
}


/* -------- file picker -------- */
function handleGifFile(file){
  if (!file || !file.type.startsWith("image/gif")) return;
  const reader = new FileReader();
  reader.onload = () => loadGifFromBuffer(reader.result);
  reader.readAsArrayBuffer(file);
}


$("gifFile").addEventListener("change", e => {
  if (e.target.files[0]) handleGifFile(e.target.files[0]);
});


/* -------- URL input (enter key) -------- */
$("gifUrl").addEventListener("keydown", e => {
  if (e.key === "Enter"){
    const url = $("gifUrl").value.trim();
    if (url) loadGifFromUrl(url, false);
  }
});


/* -------- animation loop -------- */
const clock = new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.1);
  if (state.playing) state.simTime += dt;


  if (drum){
    const slot = Math.PI * 2 / state.N;
    const f = effFps();
    let brightness = 1;


    if (state.mode === "locked"){
      drum.rotation.y = Math.floor(state.simTime * f) * slot * state.dir;
    } else {
      drum.rotation.y = state.simTime * omega() * state.dir;
      if (state.mode === "strobe"){
        const phase = (state.simTime * f) % 1;
        brightness = phase < state.duty ? 1.25 : 0.07;
      }
    }
    ambient.intensity = 0.45 * brightness;
    key.intensity     = 0.95 * brightness;
    rim.intensity     = 0.50 * Math.max(brightness, 0.4);
  }
  if (legendRing){
    legendRing.children.forEach((card, i) => {
      card.position.y = card.userData.baseY + Math.sin(state.simTime * 1.6 + i) * 0.06;
    });
  }
  updateCourtGame(state.simTime);
  updateCamera();
  renderer.render(scene, camera);
}


/* -------- boot -------- */
async function bootEmbedded(){
  const img = new Image();
  await new Promise((res, rej) => { img.onload = res; img.onerror = rej; img.src = EMBEDDED.sheet; });
  const frames = [];
  for (let i = 0; i < EMBEDDED.count; i++){
    const c = document.createElement("canvas"); c.width = c.height = EMBEDDED.cell;
    c.getContext("2d").drawImage(img,
      (i % EMBEDDED.cols) * EMBEDDED.cell, Math.floor(i / EMBEDDED.cols) * EMBEDDED.cell,
      EMBEDDED.cell, EMBEDDED.cell, 0, 0, EMBEDDED.cell, EMBEDDED.cell);
    frames.push({ canvas: c });
  }
  const cards = frames.map(f => makeCardTexture(f.canvas));
  const { N } = buildDrum(cards);
  state.N = N; state.baseFps = EMBEDDED.baseFps;
  state.sampledFrom = EMBEDDED.sampledFrom; state.simTime = 0;
  refreshStats();
  $("veil").classList.add("gone");
}


initScene(); updateCamera(); animate();
if (matchMedia("(prefers-reduced-motion: reduce)").matches){
  state.playing = false; $("playBtn").textContent = "▶"; $("playBtn").classList.remove("on");
}
// try remote GIF first — falls back to embedded sprite sheet on CORS / network error
loadGifFromUrl(DEFAULT_GIF, true);
</script>
